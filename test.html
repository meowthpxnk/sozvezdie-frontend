<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script
            src="https://vk.ru/js/api/openapi.js?169"
            type="text/javascript"
        ></script>
    </head>
    <body>
        <div id="vk_community_messages"></div>
    </body>
    <script type="text/javascript">
        import {
            Config,
            Messenger,
            CommonSDKEvents,
        } from "@vkontakte/superappkit";
        Config.init({
            appId: 54600824, // Тут нужно подставить ID своего приложения.

            appSettings: {
                agreements: "",
                promo: "",
                vkc_behavior: "",
                vkc_auth_action: "",
                vkc_brand: "",
                vkc_display_mode: "",
            },
        });

        const openMessengerHandler = () => {
            const messenger = new Messenger({
                styles: {
                    right: "10px",
                    bottom: "10px",
                    zIndex: "100",
                },
            });

            messenger.on(CommonSDKEvents.ERROR, () => {
                messenger.close();
                messenger = null;
            });

            messenger.on(CommonSDKEvents.CLOSE, () => {
                messenger = null;
            });

            messengerParams: MessengerParams = {
                expanded: false,
                messageSound: true,
                openSound: false,
                mode: "default",
                expandTimeout: undefined,
                peer_id: -147415323,
                scheme: "bright_light",
            };
            messenger.open({ ...messengerParams }).catch((error) => {
                messenger.close();
                messenger = null;
            });
        };
    </script>
</html>
